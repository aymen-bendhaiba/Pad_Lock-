services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lock-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: lock_api
      POSTGRES_PASSWORD: lock_api_password
      POSTGRES_DB: lock_management
    ports:
      - "5432:5432"
    volumes:
      - lock_postgis_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  lock_postgis_data:
